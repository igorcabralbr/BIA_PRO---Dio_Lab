<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIA PRO</title>

    <!-- Mantém seu style.css -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonte opcional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

	<style>
	body {
		margin: 0;
		font-family: 'Inter', sans-serif;
		background: linear-gradient(135deg, #020617, #0f172a);
		color: white;
	}

	/* =========================
	   APP LAYOUT
	========================= */
	.app-container {
		display: flex;
		height: 100vh;
	}

	/* ================= SIDEBAR ================= */
	#sidebar {
		width: 300px;
		background: rgba(15, 23, 42, 0.7);
		backdrop-filter: blur(20px);
		border-right: 1px solid rgba(255,255,255,0.05);
		padding: 20px;
		display: flex;
		flex-direction: column;
		gap: 20px;
	}

	.sidebar-title {
		font-size: 13px;
		font-weight: 600;
		color: #38bdf8;
		letter-spacing: 0.5px;
	}

	.profile-box,
	.insights-box {
		background: rgba(255,255,255,0.04);
		padding: 14px;
		border-radius: 14px;
		font-size: 13px;
		line-height: 1.6;
		border: 1px solid rgba(255,255,255,0.05);
	}

	/* ================= CHAT AREA ================= */
	.chat-area {
		flex: 1;
		display: flex;
		flex-direction: column;
	}

	/* HEADER */
	.header {
		padding: 18px;
		background: rgba(2,6,23,0.8);
		backdrop-filter: blur(10px);
		border-bottom: 1px solid rgba(255,255,255,0.05);
		font-weight: 600;
	}

	/* CHAT */
	#chat-container {
		flex: 1;
		padding: 24px;
		overflow-y: auto;
		display: flex;
		flex-direction: column;
		gap: 14px;
	}

	/* ================= MESSAGES ================= */
	.message {
		max-width: 70%;
		padding: 14px 16px;
		border-radius: 16px;
		line-height: 1.5;
		animation: fadeIn 0.25s ease;
	}

	.user {
		align-self: flex-end;
		background: linear-gradient(135deg, #3b82f6, #2563eb);
		box-shadow: 0 4px 20px rgba(59,130,246,0.3);
	}

	.bot {
		align-self: flex-start;
		background: rgba(255,255,255,0.05);
		backdrop-filter: blur(10px);
	}

	/* ================= INPUT ================= */
	.input-area {
		display: flex;
		padding: 18px;
		gap: 10px;
		border-top: 1px solid rgba(255,255,255,0.05);
		background: rgba(2,6,23,0.8);
	}

	#user-input {
		flex: 1;
		padding: 14px;
		border-radius: 12px;
		border: none;
		outline: none;
		background: rgba(255,255,255,0.05);
		color: white;
		transition: 0.2s;
	}

	#user-input:focus {
		box-shadow: 0 0 0 2px #3b82f6;
	}

	/* BOTÃO */
	#send-btn {
		padding: 12px 20px;
		border-radius: 12px;
		border: none;
		background: linear-gradient(135deg, #3b82f6, #2563eb);
		color: white;
		cursor: pointer;
		transition: 0.2s;
	}

	#send-btn:hover {
		transform: scale(1.05);
	}

	/* ================= QUIZ ================= */
	.quiz-option {
		padding: 10px;
		border-radius: 10px;
		border: none;
		cursor: pointer;
		background: rgba(255,255,255,0.05);
		color: white;
		transition: 0.2s;
	}

	.quiz-option:hover {
		background: #3b82f6;
	}

	.quiz-correct {
		background: #16a34a !important;
	}

	.quiz-wrong {
		background: #dc2626 !important;
	}

	/* ================= ANIMATION ================= */
	@keyframes fadeIn {
		from {opacity: 0; transform: translateY(10px);}
		to {opacity: 1;}
	}

	/* SCROLLBAR */
	::-webkit-scrollbar {
		width: 6px;
	}

	::-webkit-scrollbar-thumb {
		background: #334155;
		border-radius: 10px;
	}
	</style>
</head>

<body>

<div class="app-container">

    <!-- ================= SIDEBAR ================= -->
    <div id="sidebar">
	
		<div class="logo">
			<div class="logo-main">BIA Pró</div>
			<div class="logo-subtitle">powered by Bia Brain</div>
		</div>

        <div class="sidebar-title">👤 Cliente</div>

        <div class="profile-box">
            <div><b>Nome:</b> <span id="user-name">-</span></div>
            <div><b>Idade:</b> <span id="user-age">-</span></div>
            <div><b>Profissão:</b> <span id="user-profession">-</span></div>
            <div><b>Renda:</b> <span id="user-income">-</span></div>
            <div><b>Perfil:</b> <span id="user-profile">-</span></div>
            <div><b>Patrimônio:</b> <span id="user-wealth">-</span></div>
        </div>

        <div class="sidebar-title">📊 Insights</div>

        <div class="insights-box" id="user-insights">
            -
        </div>

    </div>

    <!-- ================= CHAT AREA ================= -->
    <div class="chat-area">

        <!-- HEADER -->
        <div class="header">
			.::.
        </div>

        <!-- CHAT -->
        <div id="chat-container"></div>

        <!-- INPUT -->
        <div class="input-area">
            <input 
                id="user-input" 
                type="text" 
                placeholder="Olá"
                autocomplete="off"
            />
            <button id="send-btn">Send</button>
        </div>

    </div>

</div>

<!-- SCRIPT -->
<script src="app.js"></script>

</body>
</html>
